monitor = DP-2, preferred, 0x0, 1
monitor = HDMI-A-1, preferred, auto, 1

workspace = 1, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 9, monitor:DP-2

workspace = 2, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

bind = $mainMod_Shift, H, focusmonitor, DP-2
bind = $mainMod_Shift, L, focusmonitor, HDMI-A-1

exec-once = bash -lc "waybar-patched -c $HOME/.config/waybar/config-left.jsonc & waybar-patched -c $HOME/.config/waybar/config-right.jsonc"  # https://github.com/Alexays/Waybar/issues/4376
